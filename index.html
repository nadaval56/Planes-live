<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>✈️ בלש הטיסות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#050d1a;--bg2:#0b1929;--bg3:#0f2035;
  --cyan:#00d4ff;--amber:#ffb830;--red:#ff5252;--green:#00e676;
  --text:#cde8f8;--muted:#4a7a9a;--border:rgba(0,212,255,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl}

/* ── SCREENS ── */
.screen{display:none;height:100%;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── SETUP SCREENS (scrollable) ── */
#screen-landing,#screen-join,#screen-teacher-setup{
  overflow-y:auto;align-items:center;justify-content:center;padding:28px 20px;
}
#screen-landing{background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,0.08),transparent 60%)}

/* ── TYPOGRAPHY ── */
.logo-icon{font-size:3.8rem;display:block;text-align:center;
  animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 18px var(--cyan))}
@keyframes float{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-8px) rotate(6deg)}}
.logo-title{font-size:2.2rem;font-weight:900;text-align:center;color:var(--cyan);
  letter-spacing:-1px;text-shadow:0 0 32px rgba(0,212,255,0.5);margin:10px 0 5px}
.logo-sub{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:28px}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px 18px;border:none;border-radius:13px;
  font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;margin-bottom:9px;transition:all 0.2s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--cyan);color:var(--bg);box-shadow:0 4px 18px rgba(0,212,255,0.3)}
.btn-amber{background:var(--amber);color:var(--bg);box-shadow:0 3px 14px rgba(255,184,48,0.3)}
.btn-secondary{background:var(--bg2);color:var(--cyan);border:1px solid var(--border)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,82,82,0.3)}
.link-btn{background:none;border:none;color:var(--muted);font-family:'Heebo',sans-serif;
  font-size:0.8rem;cursor:pointer;text-decoration:underline;padding:6px;display:block;
  text-align:center;width:100%}
.link-btn:hover{color:var(--cyan)}

/* ── INPUTS ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:0.75rem;color:var(--muted);font-weight:600;
  margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
input{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);
  border-radius:11px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.95rem;
  direction:rtl}
input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
input::placeholder{color:var(--muted)}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:12px}
.panel{width:100%;max-width:420px}
.err{color:var(--red);font-size:0.82rem;padding:6px 10px;
  background:rgba(255,82,82,0.08);border-radius:8px;margin-bottom:9px;display:none}

/* ── TOP BAR ── */
.top-bar{background:rgba(5,13,26,0.97);border-bottom:1px solid var(--border);
  padding:7px 13px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:100}
.top-bar-title{font-weight:800;font-size:0.9rem;color:var(--cyan)}
.score-chip{background:rgba(255,184,48,0.12);border:1px solid rgba(255,184,48,0.3);
  border-radius:18px;padding:3px 11px;font-size:0.88rem;color:var(--amber);font-weight:800}

/* room-code chip for teacher */
.room-chip{background:rgba(0,212,255,0.1);border:1px solid var(--border);
  border-radius:18px;padding:3px 12px;font-size:0.88rem;color:var(--cyan);font-weight:900;
  letter-spacing:4px;cursor:default}

/* ── MAP ── */
#map-wrap{position:relative;flex:1;min-height:0}
#map{width:100%;height:100%}
#map-ov{position:absolute;inset:0;z-index:50;display:flex;align-items:center;
  justify-content:center;background:rgba(5,13,26,0.88);backdrop-filter:blur(4px);
  flex-direction:column;gap:10px}
#map-ov.gone{display:none}
.ov-plane{font-size:2.6rem;animation:flyA 1.5s ease-in-out infinite}
@keyframes flyA{0%,100%{transform:translateX(-7px) rotate(-10deg)}50%{transform:translateX(7px) rotate(10deg)}}
.ov-text{color:var(--text);font-size:0.9rem}
.ov-hint{background:rgba(0,212,255,0.08);border:1px solid var(--border);border-radius:10px;
  padding:7px 14px;color:var(--muted);font-size:0.8rem;max-width:240px;text-align:center}
#pcount{position:absolute;top:8px;right:8px;z-index:49;
  background:rgba(5,13,26,0.85);border:1px solid var(--border);
  border-radius:9px;padding:3px 9px;font-size:0.74rem;color:var(--muted)}
#loading-more{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:49;
  background:rgba(5,13,26,0.9);border:1px solid var(--border);
  border-radius:9px;padding:3px 10px;font-size:0.74rem;color:var(--cyan);display:none}
#map-btns{position:absolute;bottom:8px;left:8px;z-index:49}
.map-btn{background:rgba(5,13,26,0.92);border:1px solid var(--border);color:var(--cyan);
  border-radius:9px;padding:6px 11px;font-family:'Heebo',sans-serif;font-size:0.78rem;
  cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.5)}

/* ── BOTTOM PANEL ── */
#bottom{
  flex-shrink:0;
  height:18vh;          /* compact — more map */
  min-height:130px;
  background:var(--bg2);
  border-top:2px solid var(--cyan);
  display:flex;
  flex-direction:row;
  position:relative;
  overflow:hidden;
}

/* RIGHT col — question + guess (first in RTL = rightmost visually) */
#q-col{
  width:500px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);
  background:var(--bg3);overflow:hidden;
}
/* info-col */
#info-col{
  width:160px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);
  background:var(--bg3);overflow:hidden;
}
#info-body{flex:1;padding:8px 11px;display:flex;flex-direction:column;justify-content:center}
.info-idle{color:var(--muted);font-size:0.8rem;text-align:center;line-height:1.7}
.info-cs{font-size:0.88rem;color:var(--cyan);font-weight:900;margin-bottom:4px}
.info-country{font-size:0.72rem;color:var(--muted);margin-bottom:6px}
.info-stat{font-size:0.75rem;margin-bottom:3px}
.info-stat span{color:var(--text);font-weight:700}

/* q-col internals */
#q-col{width:340px;flex-shrink:0;border-left:1px solid var(--border);overflow:hidden}
#q-body{flex:1;padding:7px 10px;display:flex;flex-direction:column;justify-content:center}
.q-idle{color:var(--muted);font-size:0.82rem;text-align:center;line-height:1.7}
.q-question{font-size:1rem;font-weight:900;color:var(--amber);margin-bottom:6px}
#q-guess{flex-shrink:0;padding:6px 10px;border-top:1px solid var(--border);display:none}
#q-guess input{padding:8px 10px;font-size:0.88rem;margin-bottom:6px}
#q-guess .btn{padding:9px;font-size:0.9rem;margin:0}

/* MIDDLE col — hints carousel */
#h-col{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-left:1px solid var(--border);
}
#h-label{flex-shrink:0;padding:4px 9px;
  font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border)}
#hint-carousel{
  flex:1;display:flex;gap:7px;
  overflow-x:auto;overflow-y:hidden;
  padding:6px 8px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  align-items:stretch;
}
#hint-carousel::-webkit-scrollbar{height:3px}
#hint-carousel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hcard{flex-shrink:0;width:180px;padding:8px 10px;scroll-snap-align:start;
  background:var(--bg3);border-radius:10px;border:1px solid var(--border);
  display:flex;flex-direction:column}
.hcard.on{border-color:var(--amber);background:rgba(255,184,48,0.05)}
.hcard.off{cursor:pointer;opacity:0.6}
.hcard.off:hover{opacity:1;border-color:rgba(255,184,48,0.5)}
.hcard-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:5px}
.hcard.on .hcard-lbl{color:var(--amber)}
.hcard.off .hcard-lbl{color:var(--muted)}
.hcard-txt{font-size:0.8rem;line-height:1.5;flex:1}
.hcard.off .hcard-txt{color:var(--muted);font-style:italic;font-size:0.74rem}
.hcard-minus{font-size:0.58rem;color:var(--red);margin-top:3px}
.idle-msg{display:flex;flex:1;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;color:var(--muted);text-align:center;font-size:0.8rem}
.idle-plane{font-size:1.8rem;animation:flyA 2s ease-in-out infinite}

/* LEFT col — leaderboard */
#lb-col{
  width:200px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg3);overflow:hidden;
}
.lb-title{flex-shrink:0;padding:6px 9px;
  font-size:0.78rem;font-weight:700;color:var(--amber);
  letter-spacing:0.5px;border-bottom:1px solid var(--border)}
#lb-rows{flex:1;overflow-y:auto;padding:3px 6px}
#lb-rows::-webkit-scrollbar{width:2px}
#lb-rows::-webkit-scrollbar-thumb{background:var(--border)}
.lb-row{display:flex;align-items:center;gap:6px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.72rem}
.lb-row:last-child{border-bottom:none}
.lb-row.me{color:var(--cyan);font-weight:700}
.lb-med{font-size:0.76rem;min-width:15px}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.92rem}
.lb-pts{color:var(--amber);font-weight:900;font-size:0.95rem;white-space:nowrap}

/* ── RESULT — absolute over entire #bottom ── */
#result{
  display:none;
  position:absolute;inset:0;z-index:200;
  background:rgba(5,13,26,0.97);
  border-top:2px solid var(--cyan);
  flex-direction:row;
  align-items:center;justify-content:center;
  gap:20px;padding:14px 20px;
  text-align:center;
}
#result.show{display:flex}
.r-emoji{font-size:2.4rem}
.r-pts{font-size:1.7rem;font-weight:900;color:var(--amber)}
.r-dest{font-size:0.9rem;margin-top:4px}
.r-dest strong{color:var(--cyan)}

/* ── LEAFLET ── */
.leaflet-tile-pane{filter:brightness(0.82) saturate(1.3)}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--cyan)!important;border-color:var(--border)!important}
.leaflet-control-attribution{background:rgba(5,13,26,0.7)!important;color:var(--muted)!important;font-size:9px!important}
.ptip{background:var(--bg2)!important;border:1px solid var(--border)!important;
  color:var(--text)!important;font-family:'Heebo',sans-serif!important;font-size:0.76rem!important;border-radius:8px!important}

/* room-code big for setup */
.room-code-big{font-size:3rem;font-weight:900;text-align:center;color:var(--amber);
  letter-spacing:12px;padding:18px;border-radius:14px;
  background:rgba(255,184,48,0.07);border:2px solid rgba(255,184,48,0.25);
  text-shadow:0 0 24px rgba(255,184,48,0.5);margin:8px 0}
</style>
</head>
<body>

<!-- ══ LANDING ══ -->
<div id="screen-landing" class="screen active">
  <span class="logo-icon">✈️</span>
  <div class="logo-title">בלש הטיסות</div>
  <div class="logo-sub">נחש מאיפה הגיע המטוס — טיסות בזמן אמת!</div>
  <div class="panel">
    <button class="btn btn-primary" onclick="goJoin()">כניסה למשחק <span style="display:inline-block;transform:scaleX(-1)">✈️</span></button>
    <button class="link-btn" onclick="goTeacherSetup()">כניסה למורה / פתיחת כיתה</button>
  </div>
  <p style="color:var(--muted);font-size:0.7rem;margin-top:16px;text-align:center">OpenSky Network · Claude AI · Firebase</p>
</div>

<!-- ══ STUDENT JOIN ══ -->
<div id="screen-join" class="screen">
  <div class="panel">
    <div style="font-size:1.3rem;font-weight:900;color:var(--cyan);margin-bottom:16px;text-align:center">✈️ כניסה למשחק</div>
    <div class="card">
      <div class="field"><label>שמך</label><input type="text" id="s-name" placeholder="הכנס שם..."/></div>
      <div class="field">
        <label>קוד כיתה</label>
        <input type="text" id="s-code" placeholder="XXXX" maxlength="4"
          style="text-transform:uppercase;font-size:1.7rem;letter-spacing:10px;text-align:center;font-weight:900"/>
      </div>
      <div class="err" id="join-err"></div>
      <button class="btn btn-primary" onclick="joinRoom()">כנס</button>
      <button class="link-btn" onclick="goHome()">← חזרה</button>
    </div>
  </div>
</div>

<!-- ══ TEACHER SETUP ══ -->
<div id="screen-teacher-setup" class="screen">
  <div class="panel">
    <div style="font-size:1.3rem;font-weight:900;color:var(--cyan);margin-bottom:16px;text-align:center">👨‍🏫 פתיחת כיתה</div>
    <div class="card">
      <div class="field"><label>שמך</label><input type="text" id="t-name" placeholder="הכנס שם..."/></div>
      <button class="btn btn-primary" onclick="openRoom()">🚀 פתח כיתה</button>
      <button class="link-btn" onclick="goHome()">← חזרה</button>
    </div>
  </div>
</div>

<!-- ══ GAME (shared — student & teacher) ══ -->
<div id="screen-game" class="screen">

  <div class="top-bar">
    <div>
      <div class="top-bar-title">✈️ בלש הטיסות</div>
      <div style="font-size:0.68rem;color:var(--muted)" id="room-lbl"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="room-chip" id="room-chip" style="display:none"></div>
      <div class="score-chip">⭐ <span id="score-el">0</span></div>
      <button class="map-btn" onclick="manualRefresh()" style="font-size:0.75rem">🔄</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-ov">
      <div class="ov-plane">✈️</div>
      <div class="ov-text">טוען טיסות...</div>
      <div class="ov-hint">לחץ על מטוס כלשהו</div>
    </div>
    <div id="pcount"></div>
    <div id="loading-more">⟳ טוען...</div>
    <div id="map-btns"><!-- empty, refresh moved to topbar --></div>
  </div>

  <!-- Bottom panel -->
  <div id="bottom">

    <!-- RIGHTMOST: flight info -->
    <div id="info-col">
      <div id="info-body">
        <div id="info-idle" class="info-idle">✈️<br>בחר מטוס<br>מהמפה</div>
        <div id="info-data" style="display:none">
          <div class="info-cs" id="info-cs"></div>
          <div class="info-country" id="info-country"></div>
          <div class="info-stat">📍 <span id="info-alt"></span></div>
          <div class="info-stat">💨 <span id="info-spd"></span></div>
          <div class="info-stat">🧭 <span id="info-dir"></span></div>
        </div>
      </div>
    </div>

    <!-- QUESTION + GUESS -->
    <div id="q-col" style="display:flex;flex-direction:column">
      <div id="q-body">
        <div id="q-idle" class="q-idle">בחר מטוס<br>כדי להתחיל</div>
        <div id="q-active" style="display:none">
          <div class="q-question">🔍 מאיפה הגעתי?</div>
        </div>
      </div>
      <div id="q-guess">
        <input type="text" id="guess-inp" placeholder="מדינה / עיר..."
          onkeydown="if(event.key==='Enter')submitGuess()"/>
        <button class="btn btn-amber" onclick="submitGuess()">🎯 נחש</button>
      </div>
    </div>

    <!-- MIDDLE: hints -->
    <div id="h-col">
      <div id="h-label">רמזים — לחץ לחשיפה</div>
      <div id="hint-carousel">
        <div class="idle-msg">
          <div class="idle-plane">✈️</div>
          <div>בחר מטוס</div>
        </div>
      </div>
    </div>

    <!-- LEFT: leaderboard -->
    <div id="lb-col">
      <div class="lb-title">🏆 ניקוד</div>
      <div id="lb-rows">
        <div style="color:var(--muted);font-size:0.7rem;text-align:center;padding:8px">ממתין...</div>
      </div>
    </div>

    <!-- RESULT overlay (absolute over #bottom) -->
    <div id="result">
      <div>
        <div class="r-emoji" id="r-emoji"></div>
      </div>
      <div>
        <div class="r-pts" id="r-pts"></div>
        <div class="r-dest" id="r-dest"></div>
        <button class="btn btn-primary" style="margin-top:8px;padding:9px 22px;width:auto" onclick="nextRound()">✈️ מטוס אחר</button>
      </div>
    </div>

  </div><!-- /bottom -->

</div><!-- /screen-game -->

<script>
const WORKER='https://proud-paper-0987.nadaval56.workers.dev/';
const FB={
  apiKey:"AIzaSyCw1RZdViDHgYbf2R_iByME3VAqJVoMH64",
  authDomain:"live-pulse-6700f.firebaseapp.com",
  databaseURL:"https://live-pulse-6700f-default-rtdb.firebaseio.com",
  projectId:"live-pulse-6700f",
  storageBucket:"live-pulse-6700f.firebasestorage.app",
  messagingSenderId:"362166556095",
  appId:"1:362166556095:web:4b86c174eb478641ce3d0a"
};
firebase.initializeApp(FB);
const db=firebase.database();

// ── map ──
let map=null, markers={}, played=new Set(), lastFetch=0, panTimer=null;

// ── state ──
let S={
  name:'',id:'',roomCode:'',role:'student',myScore:0,
  currentCS:null,hints:[],hintIdx:0,potPts:3,dest:'',kws:[],
  phase:'idle',  // idle|loading|guessing|revealed
  sRef:null,lbRef:null
};

// ── nav ──
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){show('screen-landing');}
function goJoin(){show('screen-join');}
function goTeacherSetup(){show('screen-teacher-setup');}

// ── teacher open room ──
function genCode(){return Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*33)]).join('');}

async function openRoom(){
  const name=document.getElementById('t-name').value.trim();
  if(!name){alert('נא להזין שם');return;}
  const code=genCode();
  S.name=name;S.roomCode=code;S.role='teacher';S.id='teacher_'+Date.now();
  await db.ref('rooms/'+code).set({teacher:name,created:Date.now(),active:true});
  // register teacher as participant too
  S.sRef=db.ref('rooms/'+code+'/students/'+S.id);
  await S.sRef.set({name,score:0});
  setupGame(code,'teacher');
}

// ── student join ──
async function joinRoom(){
  const name=document.getElementById('s-name').value.trim();
  const code=document.getElementById('s-code').value.trim().toUpperCase();
  const err=document.getElementById('join-err');
  err.style.display='none';
  if(!name){err.textContent='נא להזין שם';err.style.display='block';return;}
  if(code.length!==4){err.textContent='קוד 4 תווים';err.style.display='block';return;}
  const snap=await db.ref('rooms/'+code).get();
  if(!snap.exists()||!snap.val().active){err.textContent='קוד לא נמצא';err.style.display='block';return;}
  S.name=name;S.roomCode=code;S.role='student';S.id=name.replace(/[.#$\[\]/]/g,'_')+'_'+Date.now();
  S.sRef=db.ref('rooms/'+code+'/students/'+S.id);
  await S.sRef.set({name,score:0});
  setupGame(code,'student');
}

function setupGame(code,role){
  S.myScore=0;
  document.getElementById('room-lbl').textContent='כיתה: '+code;
  // Show room code chip only for teacher
  const chip=document.getElementById('room-chip');
  if(role==='teacher'){chip.textContent=code;chip.style.display='block';}
  else chip.style.display='none';
  // live score
  S.sRef.on('value',snap=>{
    if(snap.exists()){S.myScore=snap.val().score||0;const el=document.getElementById('score-el');if(el)el.textContent=S.myScore;}
  });
  // leaderboard
  S.lbRef=db.ref('rooms/'+code+'/students');
  S.lbRef.on('value',snap=>renderLb(snap.val()));
  show('screen-game');
  initMap();
}

// ── map ──
function initMap(){
  if(map){loadFlights(true);return;}
  setTimeout(()=>{
    map=L.map('map',{center:[32,35],zoom:7,zoomControl:true,attributionControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:15}).addTo(map);
    map.on('moveend',()=>{clearTimeout(panTimer);panTimer=setTimeout(()=>loadFlights(false),900);});
    loadFlights(true);
    animate();
  },120);
}

function bbox(){
  const b=map.getBounds();
  return{lamin:b.getSouth()-0.5,lomin:b.getWest()-0.5,lamax:b.getNorth()+0.5,lomax:b.getEast()+0.5};
}

async function loadFlights(initial){
  if(initial)showOv('טוען...',true); else{const m=document.getElementById('loading-more');if(m)m.style.display='block';}
  const bb=bbox();
  try{
    const r=await fetch(`https://opensky-network.org/api/states/all?lamin=${bb.lamin.toFixed(2)}&lomin=${bb.lomin.toFixed(2)}&lamax=${bb.lamax.toFixed(2)}&lomax=${bb.lomax.toFixed(2)}`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json(); lastFetch=Date.now();
    Object.entries(markers).forEach(([cs,p])=>{if(!played.has(cs))map.removeLayer(p.marker);});
    const kept={};Object.entries(markers).forEach(([cs,p])=>{if(played.has(cs))kept[cs]=p;});
    markers={...kept};
    (d.states||[]).filter(f=>f[1]&&f[1].trim()&&!f[8]&&f[5]&&f[6]&&f[7]>500).forEach(f=>{
      const cs=f[1].trim();if(played.has(cs))return;
      const mk=L.marker([f[6],f[5]],{icon:pIcon(f[10]||0,false,false)}).addTo(map);
      const alt=f[7]?Math.round(f[7]/100)*100+'מ׳':'?', spd=f[9]?Math.round(f[9]*3.6)+'קמ"ש':'?';
      mk.bindTooltip('<b>'+cs+'</b><br>'+(f[2]||'')+'<br>'+alt+' · '+spd,{direction:'top',className:'ptip',offset:[0,-10]});
      mk.on('click',()=>clickFlight(cs));
      markers[cs]={marker:mk,lat:f[6],lon:f[5],heading:f[10]||0,speed:f[9]||0,data:f};
    });
    const cnt=Object.keys(markers).length-played.size;
    const pc=document.getElementById('pcount');if(pc)pc.textContent=cnt>0?cnt+' מטוסים':'';
    hideOv();
  }catch(e){if(initial)showOv('שגיאה: '+e.message,false);}
  finally{const m=document.getElementById('loading-more');if(m)m.style.display='none';}
}

function manualRefresh(){played=new Set();resetUI();loadFlights(false);}

function pIcon(h,sel,grey){
  const color=grey?'#1c3a4a':(sel?'#ffb830':'#00d4ff');
  const glow=grey?'none':(sel?'drop-shadow(0 0 7px #ffb830)':'drop-shadow(0 0 5px #00d4ff)');
  const sz=sel?34:26;
  return L.divIcon({
    html:'<div style="transform:rotate('+(h||0)+'deg);filter:'+glow+';font-size:'+(sz-6)+'px;color:'+color+';line-height:1;transition:all 0.3s">✈</div>',
    className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
  });
}

function animate(){
  requestAnimationFrame(animate);
  const el=(Date.now()-lastFetch)/1000;
  Object.entries(markers).forEach(([cs,p])=>{
    if(played.has(cs)||!p.speed||!p.heading)return;
    const d=p.speed*el, R=6371000, hr=p.heading*Math.PI/180;
    p.marker.setLatLng([p.lat+d*Math.cos(hr)/R*(180/Math.PI), p.lon+d*Math.sin(hr)/(R*Math.cos(p.lat*Math.PI/180))*(180/Math.PI)]);
  });
}

function showOv(t,sp){const el=document.getElementById('map-ov');if(!el)return;el.classList.remove('gone');el.innerHTML=(sp?'<div class="ov-plane">✈️</div>':'')+'<div class="ov-text">'+t+'</div><div class="ov-hint">לחץ על מטוס כלשהו</div>';}
function hideOv(){const el=document.getElementById('map-ov');if(el)el.classList.add('gone');}

// ── game ──
function clickFlight(cs){
  if(S.phase==='loading'||S.phase==='guessing')return;
  if(played.has(cs))return;
  const p=markers[cs];if(!p)return;
  Object.entries(markers).forEach(([c,pl])=>{if(!played.has(c))pl.marker.setIcon(pIcon(pl.heading,c===cs,false));});
  S.currentCS=cs;S.hints=[];S.hintIdx=0;S.potPts=3;S.dest='';S.kws=[];S.phase='loading';
  const f=p.data;
  const alt=f[7]?Math.round(f[7]).toLocaleString()+'מ׳':'?';
  const spd=f[9]?Math.round(f[9]*3.6)+'קמ"ש':'?';
  // update q-col
  document.getElementById('info-idle').style.display='none';
  document.getElementById('info-data').style.display='block';
  document.getElementById('info-cs').textContent='✈ '+cs;
  document.getElementById('info-country').textContent=f[2]||'';
  document.getElementById('info-alt').textContent=alt;
  document.getElementById('info-spd').textContent=spd;
  document.getElementById('info-dir').textContent=ddir(f[10]);
  document.getElementById('q-idle').style.display='none';
  document.getElementById('q-active').style.display='block';
  document.getElementById('q-guess').style.display='none';
  // hint carousel loading
  document.getElementById('hint-carousel').innerHTML=
    '<div class="idle-msg"><span style="font-size:1.6rem;animation:flyA 1s ease-in-out infinite;display:inline-block">🤖</span><div>קלוד מכין רמזים...</div></div>';
  fetchHints(cs,f[2],f[7],f[9],f[10]);
}

async function fetchHints(cs,country,alt,vel,hdg){
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({callsign:cs,originCountry:country,altitude:alt,velocity:vel,heading:hdg})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    if(!d.destination||d.destination.trim().length<2){
      document.getElementById('hint-carousel').innerHTML='<div class="idle-msg" style="font-size:0.8rem">יעד לא ידוע<br>בחר מטוס אחר</div>';
      S.phase='idle';return;
    }
    S.hints=d.hints;S.dest=d.destination;S.kws=d.keywords||[];
    S.phase='guessing';
    buildCarousel();
    document.getElementById('q-guess').style.display='block';
    setTimeout(()=>{const i=document.getElementById('guess-inp');if(i)i.focus();},150);
  }catch(e){
    document.getElementById('hint-carousel').innerHTML='<div class="idle-msg" style="color:var(--red);font-size:0.8rem">שגיאה: '+e.message+'</div>';
    S.phase='idle';
  }
}

function buildCarousel(){
  const labels=[{t:'רמז 1',d:'קשה 🔴'},{t:'רמז 2',d:'בינוני 🟡'},{t:'רמז 3',d:'קל 🟢'}];
  const c=document.getElementById('hint-carousel'); c.innerHTML='';
  S.hints.forEach((hint,i)=>{
    const card=document.createElement('div');
    card.id='hc'+i; card.className='hcard '+(i===0?'on':'off');
    card.innerHTML='<div class="hcard-lbl">'+labels[i].t+' — '+labels[i].d+'</div>'
      +(i===0?'<div class="hcard-txt">'+hint+'</div>':'<div class="hcard-txt">לחץ לחשיפה</div><div class="hcard-minus">−1 נקודה</div>');
    if(i>0)card.onclick=()=>unlockHint(i);
    c.appendChild(card);
  });
}

function unlockHint(i){
  if(S.phase!=='guessing')return;
  const card=document.getElementById('hc'+i);
  if(!card||card.classList.contains('on'))return;
  card.classList.remove('off');card.classList.add('on');card.onclick=null;
  card.querySelector('.hcard-txt').textContent=S.hints[i];
  const m=card.querySelector('.hcard-minus');if(m)m.remove();
  S.hintIdx=i; S.potPts=Math.max(1,3-i);
  card.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

async function submitGuess(){
  if(S.phase!=='guessing')return;
  const inp=document.getElementById('guess-inp');
  if(!inp)return;
  const guess=inp.value.trim().toLowerCase();
  if(!guess)return;
  const dest=S.dest.toLowerCase();
  const kws=S.kws.map(k=>k.toLowerCase());
  const ok=dest.includes(guess)||guess.includes(dest)||kws.some(k=>k&&(guess.includes(k)||k.includes(guess)));
  const pts=ok?S.potPts:0;
  S.phase='revealed';
  // show result
  document.getElementById('r-emoji').textContent=ok?'🎉':'😔';
  document.getElementById('r-pts').textContent=ok?'+'+pts+' נקודות!':'';
  document.getElementById('r-dest').innerHTML='המוצא: <strong>'+S.dest+'</strong>';
  document.getElementById('result').classList.add('show');
  if(ok&&pts>0&&S.sRef){
    await S.sRef.transaction(cur=>{if(!cur)return{name:S.name,score:pts};cur.score=(cur.score||0)+pts;return cur;});
  }
}

function nextRound(){
  if(S.currentCS){
    played.add(S.currentCS);
    const p=markers[S.currentCS];
    if(p){p.marker.setIcon(pIcon(p.heading,false,true));p.marker.off('click');}
  }
  document.getElementById('result').classList.remove('show');
  resetUI();
}

function resetUI(){
  document.getElementById('hint-carousel').innerHTML=
    '<div class="idle-msg"><div class="idle-plane">✈️</div><div>בחר מטוס</div></div>';
  document.getElementById('info-idle').style.display='block';
  document.getElementById('info-data').style.display='none';
  document.getElementById('q-idle').style.display='block';
  document.getElementById('q-active').style.display='none';
  document.getElementById('q-guess').style.display='none';
  const gi=document.getElementById('guess-inp');if(gi)gi.value='';
  S.currentCS=null;S.phase='idle';
  Object.entries(markers).forEach(([cs,p])=>{if(!played.has(cs))p.marker.setIcon(pIcon(p.heading,false,false));});
}

function renderLb(students){
  const el=document.getElementById('lb-rows');if(!el)return;
  if(!students){el.innerHTML='<div style="color:var(--muted);font-size:0.7rem;text-align:center;padding:8px">ממתין...</div>';return;}
  const sorted=Object.entries(students).map(([id,v])=>({id,...v})).sort((a,b)=>(b.score||0)-(a.score||0));
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=sorted.map((s,i)=>
    '<div class="lb-row '+(s.id===S.id?'me':'')+'">'
    +'<span class="lb-med">'+(medals[i]||(i+1)+'.')+'</span>'
    +'<span class="lb-name">'+s.name+'</span>'
    +'<span class="lb-pts">'+(s.score||0)+'</span>'
    +'</div>').join('');
}

function ddir(h){
  if(h==null)return '?';
  return ['צ׳','צ-מ','מ׳','ד-מ','ד׳','ד-מ','מע׳','צ-מ'][Math.round(h/45)%8];
}

// cleanup old rooms
(async()=>{try{const s=await db.ref('rooms').get();if(!s.exists())return;const now=Date.now(),d={};s.forEach(c=>{if(now-c.val().created>86400000)d[c.key]=null;});if(Object.keys(d).length)await db.ref('rooms').update(d);}catch(e){}})();
</script>
